<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Ponderr TV Members</title>
    <link rel="stylesheet" href="../assets/ui/style.css">
    <link rel="preconnect" href="https://www.googleapis.com">
    <link rel="preconnect" href="https://img.youtube.com">
</head>
<body class="dark-theme">

    <header class="glass-header glass-card">
        <div class="header-left">
            <img src="../assets/logos/ponder-logo.png" alt="Ponderr TV" class="nav-logo" style="height: 50px;">
        </div>
        
        <div class="header-center theme-controls">
            <button onclick="toggleTheme('light-theme')" title="Light Mode">☀️</button>
            <button onclick="toggleTheme('dark-theme')" title="Dark Mode">🌙</button>
            <button onclick="toggleTheme('contrast-theme')" title="High Contrast">👁️</button>
        </div>

        <div class="header-right">
            <span class="platform-tag glass-card" id="platform-indicator">Detecting...</span>
        </div>
    </header>

    <main class="container">
        
        <section class="category-row">
            <h2 class="category-title">Foundation: K-12 Schoolz</h2>
            <div id="k12-container" class="video-grid">
                <div class="loading-spinner">Syncing latest lessons...</div>
            </div>
        </section>

        <section class="category-row">
            <h2 class="category-title">Professional: Xplore Academy</h2>
            <div id="pro-container" class="video-grid">
                <div class="loading-spinner">Syncing professional tracks...</div>
            </div>
        </section>

    </main>

    <div id="qr-modal" class="modal-overlay">
        <div class="modal-content glass-card">
            <h3 id="qr-text" style="color: #000;">Scan to Download</h3>
            <img id="qr-image" src="" alt="QR Code" style="border: 5px solid #fff; border-radius: 10px;">
            <p style="color: #333; margin-top: 10px;">Available on your smartphone</p>
            <button class="close-btn" onclick="PonderrApp.closeModal()" style="margin-top: 20px; padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer;">
                Back to TV
            </button>
        </div>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
